        <h1>Personality Test</h1>

        <img src="test-image.jpg" alt="Illustration representing personality traits">




        
        <form action="results.html" method="post">

          <fieldset>
            <legend>1. Do you regularly make new friends?</legend>

            <label>
              <input type="radio" name="q1" value="agree"> Agree
            </label>

            <label>
              <input type="radio" name="q1" value="sometimes"> Sometimes
            </label>

            <label>
              <input type="radio" name="q1" value="disagree"> Disagree
            </label>
          </fieldset>

          <fieldset>
            <legend>
              2. Do you prioritize and plan tasks effectively, often completing them before deadlines?
            </legend>

            <label>
              <input type="radio" name="q2" value="agree"> Agree
            </label>

            <label>
              <input type="radio" name="q2" value="sometimes"> Sometimes
            </label>

            <label>
              <input type="radio" name="q2" value="disagree"> Disagree
            </label>
          </fieldset>

          <button type="submit">Submit</button>

        </form>

      </section>
